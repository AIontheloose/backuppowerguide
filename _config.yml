title: Backup Power Guide
email:
description: Your trusted resource for home backup power, generators, solar systems, and off-grid energy solutions.
url: "https://aiontheloose.github.io"
baseurl: "/backuppowerguide"
future: true

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

author:
  name: "Backup Power Guide"
  bio: "Expert reviews and guides on home backup power systems, generators, solar panels, and off-grid energy."

nav_links:
  - title: "Energy & Power"
    url: /energy-power/
  - title: "Home & Garden"
    url: /home-garden/
  - title: "Outdoors & Camping"
    url: /outdoors-camping/
  - title: "Finance"
    url: /finance/
  - title: "Technology"
    url: /technology/
  - title: "Health"
    url: /health/
  - title: "Automotive"
    url: /automotive/
  - title: "Seasonal"
    url: /seasonal/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: true
      share: true
      related: true

permalink: /:year/:month/:day/:title/
paginate: 12
paginate_path: /page:num/
encoding: utf-8
markdown: kramdown